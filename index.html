<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Comemoração especial do nosso primeiro ano juntos"
    />
    <meta name="theme-color" content="#d63384" />
    <title>Nosso Primeiro Ano</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="hero">
      <h1 class="titulo-principal">365 Dias de Nós</h1>
      <div id="contador" class="contador-timer">Carregando...</div>
    </header>

    <section class="timeline-section">
      <h2>Nossa História</h2>
      <div class="timeline">
        <div class="container left">
          <div class="content">
            <h3>10 de maio de 2025</h3>
            <p>O dia em que tudo começou.</p>
          </div>
        </div>
        <div class="container right">
          <div class="content">
            <h3>Nosso Primeiro Encontro</h3>
            <p>Aquele sábado que mudou tudo.</p>
          </div>
        </div>
      </div>
    </section>

    <section class="mural">
      <h2>Momentos Favoritos</h2>
      <div class="galeria">
        <div class="polaroid">
          <img src="foto1.jpg" alt="Nossa primeira viagem" />
          <p>Nossa primeira viagem</p>
        </div>
        <div class="polaroid">
          <img src="foto2.jpg" alt="Risadas de domingo" />
          <p>Risadas de domingo</p>
        </div>
        <div class="polaroid">
          <img src="foto3.jpg" alt="Momento LLF" />
          <p>Momento LLF</p>
        </div>
      </div>
    </section>

    <section class="cartas">
      <h2>Cartas para Você</h2>
      <div class="grid-cartas">
        <button class="card-btn" data-carta="1">
          Leia quando estiver com saudade
        </button>
        <button class="card-btn" data-carta="2">
          Leia quando quiser sorrir
        </button>
        <button class="card-btn" data-carta="3">
          Leia quando precisar de um abraço
        </button>
        <button class="card-btn" data-carta="4">
          Leia quando precisar de um incentivo
        </button>
        <button class="card-btn" data-carta="5">
          Leia quando quiser lembrar da gente
        </button>
      </div>
    </section>

    <section class="musica">
      <h2>Nossa Trilha Sonora</h2>
      <iframe
        src="https://open.spotify.com/embed/playlist/4BRJ6FAkhsGmRIHhgVu5NB?utm_source=generator"
        width="100%"
        height="352"
        frameborder="0"
        allow="
          autoplay;
          clipboard-write;
          encrypted-media;
          fullscreen;
          picture-in-picture;
        "
        loading="lazy"
      >
      </iframe>
    </section>

    <div id="cartaModal" class="modal">
      <div class="modal-content">
        <span class="fechar-modal">&times;</span>
        <div id="conteudoCarta"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
